<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4d9fff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1a73e8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b9dff"/>
      <stop offset="100%" stop-color="#1a73e8"/>
    </linearGradient>
  </defs>
  <!-- Glow background -->
  <circle cx="100" cy="90" r="72" fill="url(#glow)"/>
  <!-- Network connections (lines) -->
  <g stroke="#2e8cf0" stroke-width="1.2" stroke-opacity="0.6" fill="none">
    <!-- Outer ring connections -->
    <line x1="55" y1="35" x2="100" y2="28"/>
    <line x1="100" y1="28" x2="140" y2="38"/>
    <line x1="140" y1="38" x2="158" y2="65"/>
    <line x1="158" y1="65" x2="155" y2="100"/>
    <line x1="155" y1="100" x2="138" y2="130"/>
    <line x1="138" y1="130" x2="105" y2="148"/>
    <line x1="105" y1="148" x2="68" y2="140"/>
    <line x1="68" y1="140" x2="45" y2="115"/>
    <line x1="45" y1="115" x2="40" y2="82"/>
    <line x1="40" y1="82" x2="55" y2="35"/>
    <!-- Inner connections -->
    <line x1="55" y1="35" x2="90" y2="65"/>
    <line x1="100" y1="28" x2="90" y2="65"/>
    <line x1="140" y1="38" x2="115" y2="70"/>
    <line x1="158" y1="65" x2="115" y2="70"/>
    <line x1="155" y1="100" x2="120" y2="105"/>
    <line x1="138" y1="130" x2="120" y2="105"/>
    <line x1="105" y1="148" x2="95" y2="115"/>
    <line x1="68" y1="140" x2="95" y2="115"/>
    <line x1="45" y1="115" x2="75" y2="95"/>
    <line x1="40" y1="82" x2="75" y2="95"/>
    <!-- Cross connections -->
    <line x1="90" y1="65" x2="115" y2="70"/>
    <line x1="115" y1="70" x2="120" y2="105"/>
    <line x1="120" y1="105" x2="95" y2="115"/>
    <line x1="95" y1="115" x2="75" y2="95"/>
    <line x1="75" y1="95" x2="90" y2="65"/>
    <!-- Extra connections for density -->
    <line x1="90" y1="65" x2="120" y2="105"/>
    <line x1="115" y1="70" x2="95" y2="115"/>
    <line x1="120" y1="105" x2="75" y2="95"/>
    <line x1="95" y1="115" x2="90" y2="65"/>
    <line x1="75" y1="95" x2="115" y2="70"/>
    <!-- Arc lines for globe effect -->
    <path d="M50,50 Q100,20 150,50" stroke-opacity="0.35"/>
    <path d="M42,90 Q100,55 158,90" stroke-opacity="0.35"/>
    <path d="M50,125 Q100,155 150,125" stroke-opacity="0.35"/>
  </g>
  <!-- Scatter dots (small) -->
  <g fill="#4da6ff" opacity="0.5">
    <circle cx="165" cy="48" r="1.5"/>
    <circle cx="170" cy="55" r="1"/>
    <circle cx="162" cy="42" r="2"/>
    <circle cx="148" cy="30" r="1.5"/>
    <circle cx="155" cy="35" r="1"/>
    <circle cx="168" cy="62" r="1.2"/>
  </g>
  <!-- Network nodes (outer ring) -->
  <g fill="url(#nodeGrad)">
    <circle cx="55" cy="35" r="5"/>
    <circle cx="100" cy="28" r="4.5"/>
    <circle cx="140" cy="38" r="5.5"/>
    <circle cx="158" cy="65" r="4"/>
    <circle cx="155" cy="100" r="5"/>
    <circle cx="138" cy="130" r="4.5"/>
    <circle cx="105" cy="148" r="4"/>
    <circle cx="68" cy="140" r="5"/>
    <circle cx="45" cy="115" r="4.5"/>
    <circle cx="40" cy="82" r="4"/>
  </g>
  <!-- Network nodes (inner ring) -->
  <g fill="#1a8cff">
    <circle cx="90" cy="65" r="6"/>
    <circle cx="115" cy="70" r="5.5"/>
    <circle cx="120" cy="105" r="5"/>
    <circle cx="95" cy="115" r="5.5"/>
    <circle cx="75" cy="95" r="6"/>
  </g>
  <!-- Center node -->
  <circle cx="100" cy="90" r="4" fill="#fff" opacity="0.9"/>
  <circle cx="100" cy="90" r="2.5" fill="#1a73e8"/>
</svg>
